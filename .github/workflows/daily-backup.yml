# 定期同步 S.H.I.T Journal 内容并归档到本仓库
name: ShitJournal Archive Sync

on:
  push:
    branches: [main]
  schedule:
    # 北京时间凌晨 1 点 (UTC 17:00)
    - cron: "0 17 * * *"
  workflow_dispatch:

concurrency:
  group: shitjournal-archive
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Sync and archive
        run: python .github/scripts/sync.py run --preprints-limit 100 --push-every 25

      - name: Commit and push archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backup/
          git diff --staged --quiet && exit 0
          git commit -m "chore(archive): sync shitjournal [automated]"
          git pull --rebase origin main
          git push origin main
