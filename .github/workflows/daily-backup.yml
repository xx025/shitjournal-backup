# 定期同步 S.H.I.T Journal 内容并归档到本仓库
name: ShitJournal Archive Sync

on:
  push:
    branches: [main]
  schedule:
    # 北京时间凌晨 1 点 (UTC 17:00)
    - cron: "0 17 * * *"
  workflow_dispatch:

concurrency:
  group: shitjournal-archive
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          lfs: false

      - name: Install poppler (pdftoppm)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync and archive
        run: python .github/scripts/sync.py run --preprints-limit 100 --push-every 25

      - name: Export index for docs
        run: python .github/scripts/sync.py export-docs

      - name: Check Hugging Face token
        run: |
          if [ -z "${{ secrets.HF_TOKEN }}" ]; then
            echo "::error::未配置 HF_TOKEN。请在仓库 Settings → Secrets and variables → Actions 中添加 HF_TOKEN（从 https://huggingface.co/settings/tokens 创建，需 write 权限）。"
            exit 1
          fi

      - name: Upload PDF and images to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python .github/scripts/upload_to_hf.py --token "$HF_TOKEN"

      - name: Commit and push archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backup/ docs/data/index.json
          git diff --staged --quiet && exit 0
          git commit -m "chore(archive): sync shitjournal [automated]"
          git fetch origin main
          git merge origin/main -m "chore(archive): merge origin/main [automated]" || true
          if git status | grep -q "Unmerged paths"; then
            git checkout --ours backup/index.json docs/data/index.json
            git add backup/index.json docs/data/index.json
            git commit --no-edit
          fi
          git push origin main
