<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>S.H.I.T Journal 归档</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="wrap">
    <header>
      <h1>S.H.I.T Journal 归档</h1>
      <p>对 S.H.I.T Journal 预印本（文章）进行长期归档，便于引用与离线访问。</p>
    </header>

    <div class="main-layout">
      <section class="section main-content" id="preprints-section">
        <h2 class="section-title">预印本</h2>
        <ul class="list" id="preprints-list">
          <li class="loading">加载中…</li>
        </ul>
        <nav class="pagination" id="preprints-pagination" aria-label="预印本分页"></nav>
      </section>
      <aside class="sidebar">
        <div class="search-bar">
          <input type="search" id="preprints-search" class="search-input" placeholder="搜索标题或 slug…" aria-label="搜索预印本">
        </div>
      </aside>
    </div>

    <footer>
      <p>索引与正文存于 <a href="https://github.com/xx025/shitjournal-backup">GitHub 仓库</a>，内容版权归 S.H.I.T Journal 及原作者所有。</p>
    </footer>
  </div>

  <script>
    // 从当前 Pages 地址自动推断仓库： https://{owner}.github.io/{repo}/
    // 本地或非 github.io 访问时使用默认仓库，否则 GitHub API 会 404
    (function () {
      var host = (window.location.hostname || '').toLowerCase();
      if (host === 'localhost' || host === '127.0.0.1' || host === '' || host.indexOf('github.io') === -1) {
        window.__REPO__ = 'xx025/shitjournal-backup';
        return;
      }
      var path = (window.location.pathname || '/').replace(/^\/+|\/+$/g, '');
      var owner = host.split('.')[0];
      var repoName = path ? path.split('/')[0] : '';
      if (!repoName || repoName === 'index.html') repoName = 'shitjournal-backup';
      window.__REPO__ = owner + '/' + repoName;
    })();
    var REPO = window.__REPO__ || 'xx025/shitjournal-backup';
    var BRANCH = 'main';
    var PAGE_SIZE = 15;
    var RAW_CDN = 'https://xget.xi-xu.me/gh';
    var HF_BASE = 'https://huggingface.co/datasets/jsonhash/shitjournal-backup/resolve/main/';
    var parts = REPO.split('/');
    var OWNER = parts[0] || 'xx025';
    var REPO_NAME = parts[1] || 'shitjournal-backup';

    function slugify(s) {
      if (!s) return 'untitled';
      return String(s)
        .replace(/[^\w\s-]/g, '')
        .replace(/[-\s]+/g, '-')
        .trim()
        .slice(0, 80) || 'untitled';
    }

function preprintPath(slug) {
      if (!slug || slug.length < 2) return `backup/preprints/xx/${slug}.md`;
      const prefix = slug.slice(0, 2).toLowerCase();
      return `backup/preprints/${prefix}/${slug}.md`;
    }

    function preprintMetaPath(slug) {
      if (!slug || slug.length < 2) return `backup/preprints/xx/${slug}.meta.json`;
      const prefix = slug.slice(0, 2).toLowerCase();
      return `backup/preprints/${prefix}/${slug}.meta.json`;
    }

    function blobUrl(path) {
      return `https://github.com/${REPO}/blob/${BRANCH}/${path}`;
    }

    function pdfCdnUrl(slug) {
      if (!slug || slug.length < 2) return '';
      var prefix = slug.slice(0, 2).toLowerCase();
      return HF_BASE + 'pdfs/' + prefix + '/' + slug + '.pdf';
    }

    function slicePage(items, page) {
      var start = (page - 1) * PAGE_SIZE;
      return items.slice(start, start + PAGE_SIZE);
    }

    function totalPages(total) {
      return Math.max(1, Math.ceil(total / PAGE_SIZE));
    }

    function renderPagination(containerId, currentPage, total, onPageChange, withJump) {
      const nav = document.getElementById(containerId);
      nav.innerHTML = '';
      if (total <= 0) return;
      const pages = totalPages(total);
      const frag = document.createDocumentFragment();
      const prev = document.createElement('button');
      prev.type = 'button';
      prev.className = 'pagination-btn';
      prev.textContent = '上一页';
      prev.disabled = currentPage <= 1;
      prev.addEventListener('click', function () { if (currentPage > 1) onPageChange(currentPage - 1); });
      frag.appendChild(prev);
      const span = document.createElement('span');
      span.className = 'pagination-info';
      span.textContent = '第 ' + currentPage + ' / ' + pages + ' 页，共 ' + total + ' 条';
      frag.appendChild(span);
      const next = document.createElement('button');
      next.type = 'button';
      next.className = 'pagination-btn';
      next.textContent = '下一页';
      next.disabled = currentPage >= pages;
      next.addEventListener('click', function () { if (currentPage < pages) onPageChange(currentPage + 1); });
      frag.appendChild(next);
      if (withJump && pages > 1) {
        const jumpWrap = document.createElement('span');
        jumpWrap.className = 'pagination-jump';
        const inp = document.createElement('input');
        inp.type = 'text';
        inp.inputMode = 'numeric';
        inp.setAttribute('aria-label', '页码');
        inp.setAttribute('data-max', pages);
        inp.value = currentPage;
        const jumpBtn = document.createElement('button');
        jumpBtn.type = 'button';
        jumpBtn.className = 'jump-btn';
        jumpBtn.textContent = '跳转';
        jumpBtn.addEventListener('click', function () {
          var p = parseInt(inp.value, 10);
          var max = pages;
          if (p >= 1 && p <= max) onPageChange(p);
          else inp.value = currentPage;
        });
        inp.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') jumpBtn.click();
        });
        jumpWrap.appendChild(inp);
        jumpWrap.appendChild(jumpBtn);
        frag.appendChild(jumpWrap);
      }
      nav.appendChild(frag);
    }

    function getPreprintList() {
      var raw = window.__preprintItems__ || [];
      var q = (window.__preprintSearch__ || '').trim().toLowerCase();
      if (!q) return raw;
      return raw.filter(function (item) {
        var title = (item.title || '').toLowerCase();
        var slug = (item.slug || '').toLowerCase();
        return title.indexOf(q) !== -1 || slug.indexOf(q) !== -1;
      });
    }

    function renderPreprints(items, page) {
      page = page || 1;
      const ul = document.getElementById('preprints-list');
      ul.innerHTML = '';
      if (!items.length) {
        ul.innerHTML = '<li class="loading">' + (window.__preprintSearch__ ? '无匹配结果' : '暂无收录') + '</li>';
        renderPagination('preprints-pagination', 1, 0, function () {}, true);
        return;
      }
      const pageItems = slicePage(items, page);
      pageItems.forEach(function (item) {
        const previewUrl = 'preview.html?slug=' + encodeURIComponent(item.slug);
        const originUrl = item.url || ('https://shitjournal.org/preprints/' + item.slug);
        const metaPath = preprintMetaPath(item.slug);
        const li = document.createElement('li');
        var linkParts = [];
        linkParts.push('<a href="' + escapeHtml(originUrl) + '" target="_blank" rel="noopener" class="list-link">[原文链接]</a>');
        if (item.pdf_url) linkParts.push('<a href="' + escapeHtml(pdfCdnUrl(item.slug)) + '" target="_blank" rel="noopener" class="list-link">[PDF下载]</a>');
        linkParts.push('<a href="' + blobUrl(metaPath) + '" target="_blank" rel="noopener" class="list-link">[元信息]</a>');
        li.innerHTML = '<a href="' + previewUrl + '" class="list-title">' + escapeHtml(item.title || item.slug) + '</a>' +
          '<span class="list-links">' + linkParts.join(' ') + '</span>';
        ul.appendChild(li);
      });
      renderPagination('preprints-pagination', page, items.length, function (p) {
        renderPreprints(getPreprintList(), p);
      }, true);
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    function showError(sectionId, msg) {
      const section = document.getElementById(sectionId);
      if (section) {
        const list = section.querySelector('.list');
        if (list) list.innerHTML = '<li class="error">' + escapeHtml(msg) + '</li>';
      }
    }

    function base64ToUtf8(base64) {
      var b64 = (base64 || '').replace(/\s/g, '');
      var binary = atob(b64);
      var bytes = new Uint8Array(binary.length);
      for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      try {
        return new TextDecoder('utf-8').decode(bytes);
      } catch (e) {
        return decodeURIComponent(escape(binary));
      }
    }
    function applyIndex(index) {
      if (!index || typeof index !== "object") {
        onIndexError(new Error('索引格式无效'));
        return;
      }
      if (index.hf_base) HF_BASE = String(index.hf_base);
      var preprintsRaw = index.preprints || [];
      var items = Array.isArray(preprintsRaw) ? preprintsRaw.slice() : [];
      items.sort(function (a, b) {
        var ta = Date.parse(a && a.created_at ? a.created_at : '') || 0;
        var tb = Date.parse(b && b.created_at ? b.created_at : '') || 0;
        if (ta !== tb) return tb - ta; // 新的在前
        var sa = (a && a.slug) || '';
        var sb = (b && b.slug) || '';
        return sb.localeCompare(sa);
      });
      window.__preprintItems__ = items;
      window.__preprintSearch__ = '';
      renderPreprints(window.__preprintItems__, 1);
      var searchEl = document.getElementById('preprints-search');
      if (searchEl && !searchEl._bound) {
        searchEl._bound = true;
        searchEl.addEventListener('input', function () {
          window.__preprintSearch__ = searchEl.value;
          renderPreprints(getPreprintList(), 1);
        });
      }
      return index;
    }
    function onIndexError(err) {
      renderPreprints([]);
      showError('preprints-section', '无法加载索引：' + (err.message || '请稍后重试'));
    }
    // 优先使用导出的本地 data/index.json，失败再走 GitHub API
    fetch('data/index.json')
      .then(function (r) {
        if (r.ok) return r.text().then(function (text) { return JSON.parse(text); });
        throw new Error('本地索引不存在');
      })
      .then(applyIndex)
      .catch(function () {
        return fetch('https://api.github.com/repos/' + REPO + '/contents/backup/index.json?ref=' + BRANCH)
          .then(function (r) { return r.json(); })
          .then(function (data) {
            if (data.message) throw new Error(data.message);
            var raw = base64ToUtf8(data.content);
            return JSON.parse(raw);
          });
      })
      .then(applyIndex)
      .catch(onIndexError);
  </script>
</body>
</html>
