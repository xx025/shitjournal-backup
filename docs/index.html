<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>S.H.I.T Journal 归档</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="wrap">
    <header>
      <h1>S.H.I.T Journal 归档</h1>
      <p>对 S.H.I.T Journal 的新闻与预印本进行长期归档，便于引用与离线访问。</p>
    </header>

    <section class="section" id="recent-updates-section" style="display: none;">
      <h2 class="section-title">最近更新</h2>
      <ul class="list" id="recent-updates-list"></ul>
    </section>

    <section class="section" id="news-section">
      <h2 class="section-title">新闻</h2>
      <ul class="list" id="news-list">
        <li class="loading">加载中…</li>
      </ul>
      <nav class="pagination" id="news-pagination" aria-label="新闻分页"></nav>
    </section>

    <section class="section" id="preprints-section">
      <h2 class="section-title">预印本</h2>
      <ul class="list" id="preprints-list">
        <li class="loading">加载中…</li>
      </ul>
      <nav class="pagination" id="preprints-pagination" aria-label="预印本分页"></nav>
    </section>

    <footer>
      <p>索引与正文存于 <a href="https://github.com/xx025/shitjournal-backup">GitHub 仓库</a>，内容版权归 S.H.I.T Journal 及原作者所有。</p>
    </footer>
  </div>

  <script>
    // 从当前 Pages 地址自动推断仓库： https://{owner}.github.io/{repo}/
    // 本地或非 github.io 访问时使用默认仓库，否则 GitHub API 会 404
    (function () {
      var host = (window.location.hostname || '').toLowerCase();
      if (host === 'localhost' || host === '127.0.0.1' || host === '' || host.indexOf('github.io') === -1) {
        window.__REPO__ = 'xx025/shitjournal-backup';
        return;
      }
      var path = (window.location.pathname || '/').replace(/^\/+|\/+$/g, '');
      var owner = host.split('.')[0];
      var repoName = path ? path.split('/')[0] : '';
      if (!repoName || repoName === 'index.html') repoName = 'shitjournal-backup';
      window.__REPO__ = owner + '/' + repoName;
    })();
    var REPO = window.__REPO__ || 'xx025/shitjournal-backup';
    var BRANCH = 'main';
    var PAGE_SIZE = 15;

    function slugify(s) {
      if (!s) return 'untitled';
      return String(s)
        .replace(/[^\w\s-]/g, '')
        .replace(/[-\s]+/g, '-')
        .trim()
        .slice(0, 80) || 'untitled';
    }

    function newsPath(slug) {
      const first = (slug && slug[0]) || 'x';
      const file = slugify(slug) || 'untitled';
      return `backup/news/${first.toLowerCase()}/${file}.md`;
    }

    function preprintPath(slug) {
      if (!slug || slug.length < 2) return `backup/preprints/xx/${slug}.md`;
      const prefix = slug.slice(0, 2).toLowerCase();
      return `backup/preprints/${prefix}/${slug}.md`;
    }

    function blobUrl(path) {
      return `https://github.com/${REPO}/blob/${BRANCH}/${path}`;
    }

    function slicePage(items, page) {
      var start = (page - 1) * PAGE_SIZE;
      return items.slice(start, start + PAGE_SIZE);
    }

    function totalPages(total) {
      return Math.max(1, Math.ceil(total / PAGE_SIZE));
    }

    function renderPagination(containerId, currentPage, total, onPageChange) {
      const nav = document.getElementById(containerId);
      nav.innerHTML = '';
      if (total <= PAGE_SIZE) return;
      const pages = totalPages(total);
      const frag = document.createDocumentFragment();
      const prev = document.createElement('button');
      prev.type = 'button';
      prev.className = 'pagination-btn';
      prev.textContent = '上一页';
      prev.disabled = currentPage <= 1;
      prev.addEventListener('click', function () { if (currentPage > 1) onPageChange(currentPage - 1); });
      frag.appendChild(prev);
      const span = document.createElement('span');
      span.className = 'pagination-info';
      span.textContent = '第 ' + currentPage + ' / ' + pages + ' 页，共 ' + total + ' 条';
      frag.appendChild(span);
      const next = document.createElement('button');
      next.type = 'button';
      next.className = 'pagination-btn';
      next.textContent = '下一页';
      next.disabled = currentPage >= pages;
      next.addEventListener('click', function () { if (currentPage < pages) onPageChange(currentPage + 1); });
      frag.appendChild(next);
      nav.appendChild(frag);
    }

    function renderNews(items, page) {
      page = page || 1;
      const ul = document.getElementById('news-list');
      ul.innerHTML = '';
      if (!items.length) {
        ul.innerHTML = '<li class="loading">暂无收录</li>';
        renderPagination('news-pagination', 1, 0, function () {});
        return;
      }
      const pageItems = slicePage(items, page);
      pageItems.forEach(function (item) {
        const path = newsPath(item.slug);
        const li = document.createElement('li');
        li.innerHTML = '<a href="' + blobUrl(path) + '" target="_blank" rel="noopener">' +
          '<span class="title">' + escapeHtml(item.title || item.slug) + '</span>' +
          (item.url ? '<span class="meta">' + escapeHtml(item.url) + '</span>' : '') +
          '</a>';
        ul.appendChild(li);
      });
      renderPagination('news-pagination', page, items.length, function (p) {
        renderNews(window.__newsItems__ || [], p);
      });
    }

    function renderPreprints(items, page) {
      page = page || 1;
      const ul = document.getElementById('preprints-list');
      ul.innerHTML = '';
      if (!items.length) {
        ul.innerHTML = '<li class="loading">暂无收录</li>';
        renderPagination('preprints-pagination', 1, 0, function () {});
        return;
      }
      const pageItems = slicePage(items, page);
      pageItems.forEach(function (item) {
        const path = preprintPath(item.slug);
        const li = document.createElement('li');
        li.innerHTML = '<a href="' + blobUrl(path) + '" target="_blank" rel="noopener">' +
          '<span class="title">' + escapeHtml(item.title || item.slug) + '</span>' +
          (item.url ? '<span class="meta">' + escapeHtml(item.url) + '</span>' : '') +
          '</a>';
        ul.appendChild(li);
      });
      renderPagination('preprints-pagination', page, items.length, function (p) {
        renderPreprints(window.__preprintItems__ || [], p);
      });
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    function showError(sectionId, msg) {
      const section = document.getElementById(sectionId);
      if (section) {
        const list = section.querySelector('.list');
        if (list) list.innerHTML = '<li class="error">' + escapeHtml(msg) + '</li>';
      }
    }

    function base64ToUtf8(base64) {
      var b64 = (base64 || '').replace(/\s/g, '');
      var binary = atob(b64);
      var bytes = new Uint8Array(binary.length);
      for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      try {
        return new TextDecoder('utf-8').decode(bytes);
      } catch (e) {
        return decodeURIComponent(escape(binary));
      }
    }
    var RECENT_NEWS_COUNT = 1;
    var RECENT_PREPRINTS_COUNT = 5;

    function renderRecentUpdatesFromIndex(newsItems, preprintItems) {
      var recentNews = (newsItems || []).slice(0, RECENT_NEWS_COUNT);
      var recentPreprints = (preprintItems || []).slice(0, RECENT_PREPRINTS_COUNT);
      if (recentNews.length === 0 && recentPreprints.length === 0) return;
      var section = document.getElementById('recent-updates-section');
      var ul = document.getElementById('recent-updates-list');
      if (!section || !ul) return;
      ul.innerHTML = '';
      recentNews.forEach(function (item) {
        var path = newsPath(item.slug);
        var li = document.createElement('li');
        li.innerHTML = '<a href="' + blobUrl(path) + '" target="_blank" rel="noopener">' +
          '<span class="title">' + escapeHtml(item.title || item.slug) + '</span>' +
          '<span class="meta">新闻</span>' +
          '</a>';
        ul.appendChild(li);
      });
      recentPreprints.forEach(function (item) {
        var path = preprintPath(item.slug);
        var li = document.createElement('li');
        li.innerHTML = '<a href="' + blobUrl(path) + '" target="_blank" rel="noopener">' +
          '<span class="title">' + escapeHtml(item.title || item.slug) + '</span>' +
          '<span class="meta">预印本</span>' +
          '</a>';
        ul.appendChild(li);
      });
      section.style.display = 'block';
    }

    fetch('https://api.github.com/repos/' + REPO + '/contents/backup/index.json?ref=' + BRANCH)
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data.message) throw new Error(data.message);
        var raw = base64ToUtf8(data.content);
        var index = JSON.parse(raw);
        var newsRaw = index.news || [];
        var preprintsRaw = index.preprints || [];
        window.__newsItems__ = newsRaw.slice().reverse();
        window.__preprintItems__ = preprintsRaw.slice().reverse();
        renderNews(window.__newsItems__, 1);
        renderPreprints(window.__preprintItems__, 1);
        renderRecentUpdatesFromIndex(window.__newsItems__, window.__preprintItems__);
      })
      .catch(function (err) {
        renderNews([]);
        renderPreprints([]);
        showError('news-section', '无法加载索引：' + (err.message || '请稍后重试'));
      });
  </script>
</body>
</html>
